# Semantic verifier (text-motion matching) config.
#
# Replaces the original train_evaluator.py `Config` python class. Paths resolve through
# OmegaConf env interpolation so nothing here is a hardcoded user path:
#   ${oc.env:TSD_DATA}/...    -> dataset root (see utilities.paths.DATA_ROOT)
#   ${oc.env:TSD_ASSETS}/...  -> checkpoint / glove root (see utilities.paths.ASSETS_ROOT)
#
# Load with: OmegaConf.load("configs/evaluator.yaml"); utilities.paths import sets
# TSD_DATA/TSD_ASSETS env defaults (<repo>/data, <repo>/assets) if unset.

data:
  # Expects {data_root}/new_joint_vecs/*.npy, {data_root}/texts/*.txt,
  # {data_root}/train.txt, {data_root}/val.txt
  data_root: ${oc.env:TSD_DATA}/CustomCombined
  glove_dir: ${oc.env:TSD_ASSETS}/glove
  code_path: TOKENS_FSQ  # informational only; evaluator trains on new_joint_vecs, not tokens

# Output structured to match TEXEDO generator's expected path:
#   {save_root}/custom36/t2m/text_mot_match/model/finest.tar
#   {save_root}/custom36/t2m/Decomp_SP001_SM001_H512/model/finest.tar
#   {save_root}/custom36/t2m/Comp_v6_KLD01/meta/{mean.npy,std.npy}
save_root: ${oc.env:TSD_ASSETS}/verifiers/semantic/t2m_custom36_combinedv2

# Motion params (36-dim: root xyz(3) + root quat(4) + joint angles(29), no foot contacts)
motion:
  dim_pose: 36
  foot_contact_dims: 0
  motion_input_dim: 36
  root_pos_dims: 3
  use_root_vel: true

# Length params
length:
  max_motion_length: 2048
  min_motion_len: 16
  max_text_len: 50
  unit_length: 4

# Architecture
arch:
  dim_movement_enc_hidden: 512
  dim_movement_latent: 512
  dim_text_hidden: 512
  dim_motion_hidden: 1024
  dim_coemb_hidden: 512
  dim_word: 300
  dim_pos_ohot: 15

# Step 2: decomposition (MovementConvEncoder + MovementConvDecoder) training
decomp:
  lr: 5.0e-5
  epochs: 300
  batch_size: 32
  window: 64           # frames per sample (64 -> 16 latent frames after 4x downsample)
  lambda_sparsity: 5.0e-4
  lambda_smooth: 1.0e-3

# Step 3: text-motion contrastive matching training
match:
  lr: 1.0e-4
  epochs: 300
  batch_size: 64
  negative_margin: 2.0
  warmup_iters: 200
  lr_min: 1.0e-6

# General
general:
  gpu_id: 0
  log_every: 50
  save_every_e: 20
  eval_every_e: 5
  seed: 1234

wandb:
  use_wandb: false
  project: evaluator-train-36dim
  run_name: null
