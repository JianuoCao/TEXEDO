# Asset & dataset manifest.
#
# scripts/download_assets.py reads this file and fetches each entry into ${TSD_ASSETS}
# (checkpoints) or ${TSD_DATA} (datasets). Edit `hf_repo` once you have pushed the
# checkpoints to a Hugging Face model repo (see docs/MODELS.md and docs/UPLOAD.md).
#
# Paths under `local` are RELATIVE to TSD_ASSETS (checkpoints) or TSD_DATA (datasets).

dataset:
  texedo:
    hf_repo: JianuoCao/TEXEDO
    hf_type: dataset
    local: texedo                  # -> ${TSD_DATA}/texedo
    note: "Public. Motions+texts; FSQ tokens are regenerated by prepare_dataset.py."

# Set hf_repo to your uploaded model repo, e.g. "JianuoCao/TEXEDO-checkpoints".
checkpoints:
  hf_repo: TODO_USER_MODEL_REPO
  hf_type: model
  files:
    fsq_tokenizer:
      remote: tokenizer/checkpoint_epoch_95.pt
      local: tokenizer/checkpoint_epoch_95.pt
    fsq_norm_stats:
      remote: tokenizer/fsq_motion_stats_combined.npz
      local: tokenizer/fsq_motion_stats_combined.npz
    generator:
      remote: generator/epoch=489.ckpt
      local: generator/epoch=489.ckpt
    dynamic_verifier:
      remote: verifiers/dynamic/checkpoint_last.pt
      local: verifiers/dynamic/checkpoint_last.pt
      note: "v5 checkpoint."
    dynamic_norm_stats:
      remote: verifiers/dynamic/norm_stats.npz
      local: verifiers/dynamic/norm_stats.npz
      note: "v3 norm_stats — the stats file v5 is actually evaluated with. See docs/MODELS.md."
    semantic_evaluator:
      remote: verifiers/semantic/t2m_custom36_combinedv2.tar.gz
      local: verifiers/semantic/t2m_custom36_combinedv2.tar.gz
      unpack: true
      note: "Unpacks to verifiers/semantic/t2m_custom36_combinedv2/{text_mot_match,Decomp_SP001_SM001_H512,Comp_v6_KLD01}."
    glove:
      remote: glove/glove.tar.gz
      local: glove/glove.tar.gz
      unpack: true
      note: "Must unpack so our_vab_data.npy / our_vab_idx.pkl / our_vab_words.pkl sit directly in assets/glove/ (WordVectorizer reads them there)."
    g1_robot:
      remote: robot/g1.tar.gz
      local: robot/g1.tar.gz
      unpack: true
      note: "Unitree G1 29-DoF MuJoCo model (xml + meshes/) used by scripts/visualize_csv.py. Unpacks to assets/robot/g1/{g1_29dof_rev_1_0.xml,meshes/}."

# Loaded from the public HF hub at runtime by the generator; not hosted here.
runtime:
  flan_t5_base: google/flan-t5-base
