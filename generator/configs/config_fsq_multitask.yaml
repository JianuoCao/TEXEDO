NAME: CustomCombined_Stage2_FSQ_MultiTask
ACCELERATOR: 'gpu'
NUM_NODES: 1
DEVICE: [0,1]

TRAIN:
  #---------------------------------
  STAGE: lm_pretrain
  #---------------------------------
  NUM_WORKERS: 8
  BATCH_SIZE: 16
  END_EPOCH: 999999
  # Set to your own experiment dir to resume; empty starts fresh.
  RESUME: ''
  PRETRAINED: ''
  # Frozen FSQ tokenizer checkpoint (downloaded via scripts/download_assets.py).
  PRETRAINED_VAE: ${oc.env:TSD_ASSETS}/tokenizer/checkpoint_epoch_95.pt

  OPTIM:
    target: AdamW
    params:
      lr: 6e-4
      betas: [0.9, 0.99]
      weight_decay: 0.0

  LR_SCHEDULER:
    target: CosineAnnealingLR
    params:
      T_max: ${eval:${LOGGER.VAL_EVERY_STEPS} * 100}
      eta_min: 1.0e-06

EVAL:
  BATCH_SIZE: 32
  SPLIT: val

TEST:
  # Released generator checkpoint (downloaded via scripts/download_assets.py).
  CHECKPOINTS: ${oc.env:TSD_ASSETS}/generator/epoch=489.ckpt
  SPLIT: test
  BATCH_SIZE: 512
  DETERMINISTIC: false
  DO_SAMPLE: true
  REPLICATION_TIMES: 1

DATASET:
  target: mgpt.data.CustomCombined.CustomDataModule_Combined
  CODE_PATH: TOKENS_FSQ
  DATAPATH: ${oc.env:TSD_DATA}/CustomCombined
  NFEATS: 36

  CUSTOM_COMBINED:
    ROOT: ${oc.env:TSD_DATA}/CustomCombined
    MAX_MOTION_LEN: 2048
    MIN_MOTION_LEN: 16
    MAX_TEXT_LEN: 50
    PICK_ONE_TEXT: true
    UNIT_LEN: 4       # FSQ: 4x temporal downsample, no interleave
    FPS: 50
    STD_TEXT: False
    TEXT_DIR: texts

LOSS:
  LAMBDA_CLS: 1.0

# ---------------------------------------------------------------------------
# Metrics — 36-dim semantic evaluator (text_mot_match). Trained via
# verifiers/semantic; checkpoint fetched into ${TSD_ASSETS}/verifiers/semantic.
# ---------------------------------------------------------------------------
METRIC:
  TYPE: ['TM2TMetrics', 'PredMetrics']
  TASK: t2m
  FORCE_IN_METER: true
  DIST_SYNC_ON_STEP: true
  MM_NUM_SAMPLES: 20
  MM_NUM_REPEATS: 64
  MM_NUM_TIMES: 5
  DIVERSITY_TIMES: 100
  TM2T:
    t2m_textencoder:
      target: mgpt.archs.tm2t_evaluator.TextEncoderBiGRUCo
      params:
        word_size: 300
        pos_size: 15
        hidden_size: 512
        output_size: 512
    t2m_moveencoder:
      target: mgpt.archs.tm2t_evaluator.MovementConvEncoder
      params:
        input_size: 36
        hidden_size: 512
        output_size: 512
    t2m_motionencoder:
      target: mgpt.archs.tm2t_evaluator.MotionEncoderBiGRUCo
      params:
        input_size: 512
        hidden_size: 1024
        output_size: 512
    t2m_path: ${oc.env:TSD_ASSETS}/verifiers/semantic/t2m_custom36_combinedv2/

model:
  target: mgpt.models.mgpt.MotionGPT
  params:
    condition: 'text'
    task: 't2m'
    lm: ${lm.default}
    motion_vae: ${vq.fsq}
    codebook_size: 7776   # prod([3,3,3,3,3,2,2,2,2,2])

LOGGER:
  TYPE: ['tensorboard', 'wandb']
  VAL_EVERY_STEPS: 10
  WANDB:
    params:
      project: motiongpt-custom
      name: customcombined_stage2_fsq_multitask
